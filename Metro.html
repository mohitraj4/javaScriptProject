<!DOCTYPE html>
<html lang="en">
<head>
  
  
  <title>MetroDiscount</title>
</head>
<body>
  <h1>Kindly choose your gender or Age to get some offerDiscount in console</h1>

  <script>
    let age=7;
    let gender='male';
    let finalDiscount;
    if(age<=5){
      finalDiscount='100 %';

    }
    else if(gender==='Female' || age<=8){
      finalDiscount='You will get 50% off';

    }
    else if(age>=65){
      finalDiscount='30 %'

    }
    else{
      finalDiscount=0;
    }
    console.log(`Your final discount is ${finalDiscount}`);

  </script>
</body>
</html>
